<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coming Soon</title>

<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
}

/* chữ chạy ngang */
.marquee {
    position: absolute;
    white-space: nowrap;
    font-size: 40px;
    font-weight: bold;
    animation: runText 10s linear infinite, colorChange 2s infinite;
}

/* animation chạy từ trái qua phải */
@keyframes runText {
    0% { left: -100%; }
    100% { left: 100%; }
}

/* đổi màu liên tục */
@keyframes colorChange {
    0% { color: red; }
    25% { color: yellow; }
    50% { color: lime; }
    75% { color: cyan; }
    100% { color: red; }
}
</style>
</head>

<body>

<div class="marquee">
    🚧 WEBSITE ĐANG HOÀN THIỆN - VUI LÒNG QUAY LẠI SAU 🚧
</div>

</body>
</html>
