<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEOGOD.SITE | Đỉnh Cao Soi Kèo</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(-45deg, #0d1117, #161b22, #0d1117);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #ffffff; margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header { 
            width: 100%; padding: 50px 0; background: rgba(22, 27, 34, 0.8);
            border-bottom: 3px solid #2ea043; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .match-card { 
            background: #1c2128; border: 1px solid #444c56; border-radius: 15px; 
            padding: 25px; margin-bottom: 25px; transition: all 0.3s ease; width: 90%; max-width: 500px;
        }
        .match-card:hover { 
            transform: translateY(-10px); border-color: #2ea043; box-shadow: 0 10px 30px rgba(46, 160, 67, 0.2);
        }
        .btn-join {
            display: inline-block; margin-top: 20px; padding: 15px 40px; background: #2ea043;
            color: white; text-decoration: none; border-radius: 50px; font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 160, 67, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(46, 160, 67, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 160, 67, 0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>KEOGOD.SITE</h1>
        <p>Dự đoán chính xác - Về bờ an toàn</p>
    </div>
    <div class="match-card" style="margin-top: 30px;">
        <div style="display: flex; justify-content: space-between;">
            <span>MU vs Liverpool</span>
            <span style="color: #ff3e3e; animation: blink 1s infinite;">LIVE</span>
        </div>
        <p style="color: #3fb950; background: rgba(46, 160, 67, 0.1); padding: 10px; border-radius: 5px; margin-top: 15px;">
            Dự đoán: Tài 2.5
        </p>
    </div>
    <a href="https://zalo.me/your-link" class="btn-join">VÀO NHÓM LẤY KÈO VIP</a>
</body>
</html>
