<script>
function rollDice() {
  return Math.floor(Math.random() * 6) + 1;
}

function autoPlay() {
  let d1 = rollDice();
  let d2 = rollDice();
  let d3 = rollDice();

  let sum = d1 + d2 + d3;
  let result = sum >= 11 ? "TÀI 🔥" : "XỈU ❄️";

  document.getElementById("dice").innerHTML =
    d1 + " - " + d2 + " - " + d3;

  document.getElementById("result").innerHTML =
    "Kết quả: " + result;
}

// chạy mỗi 3 giây
setInterval(autoPlay, 3000);

// chạy lần đầu luôn
autoPlay();
</script>
