<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài Xỉu VIP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #020617;
  color: white;
}

h1 {
  color: #22c55e;
}

/* timer */
.timer {
  font-size: 40px;
  margin: 20px;
  color: yellow;
}

/* xúc xắc */
.dice {
  font-size: 50px;
  margin: 20px;
}

/* kết quả */
.result {
  font-size: 24px;
  margin: 10px;
}

/* lịch sử */
.history {
  margin-top: 20px;
}

.circle {
  display: inline-block;
  width: 30px;
  height: 30px;
  line-height: 30px;
  border-radius: 50%;
  margin: 3px;
  font-weight: bold;
}

.tai { background: green; }
.xiu { background: red; }

</style>
</head>

<body>

<h1>🎲 TÀI XỈU VIP 🎲</h1>

<div class="timer" id="timer">60</div>

<div class="dice" id="dice">🎲 🎲 🎲</div>

<div class="result" id="result">Đang chờ mở bát...</div>

<div class="history" id="history"></div>

<script>
let time = 60;
let history = [];

function rollDice() {
  return Math.floor(Math.random() * 6) + 1;
}

function gameLoop() {
  time--;

  document.getElementById("timer").innerHTML = time + "s";

  // 5 giây cuối
  if (time <= 5) {
    document.getElementById("result").innerHTML = "⏳ Sắp mở bát...";
  }

  // hết giờ → mở bát
  if (time === 0) {
    let d1 = rollDice();
    let d2 = rollDice();
    let d3 = rollDice();

    let sum = d1 + d2 + d3;
    let result = sum >= 11 ? "T" : "X";

    document.getElementById("dice").innerHTML =
      d1 + " - " + d2 + " - " + d3;

    document.getElementById("result").innerHTML =
      "🎯 Kết quả: " + (result === "T" ? "TÀI 🔥" : "XỈU ❄️");

    history.unshift(result);
    if (history.length > 20) history.pop();

    renderHistory();

    time = 60; // reset lại
  }
}

function renderHistory() {
  let html = "";
  history.forEach(h => {
    html += `<div class="circle ${h === "T" ? "tai" : "xiu"}">${h}</div>`;
  });
  document.getElementById("history").innerHTML = html;
}

setInterval(gameLoop, 1000);
</script>

</body>
</html>
